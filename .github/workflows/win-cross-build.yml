name: Win Cross Build CI

# Cross-compiles Firefox for Windows x86_64 from Linux (firefox-build runner).
# Toolchain: Mozilla clang-cl + xwin sysroot at /opt/win-toolchain
# mozconfig: /opt/codex/firefox/mozconfig.win-cross
# Obj dir:   /opt/codex/firefox/builds/win-cross-obj

on:
  push:
    branches:
      - 'build/win-**'
  workflow_dispatch:

jobs:
  win-cross:
    name: Win Cross (${{ github.ref_name }})
    runs-on: [self-hosted, linux, firefox-build]
    timeout-minutes: 240

    env:
      BUILD_DIR: /opt/codex/firefox/dev
      MOZCONFIG: /opt/codex/firefox/dev/infra/mozconfig.win-cross
      ARTIFACT_DIR: /opt/codex/firefox/artifacts/win/${{ github.run_id }}
      RUSTC_WRAPPER: /opt/codex/firefox/dev/infra/ccwrap
      SCCACHE_REDIS: redis://192.168.1.230:6379
      SCCACHE_DIST_SERVER: http://192.168.1.220:10500

    steps:
      - name: Fetch and checkout build branch
        run: |
          cd "$BUILD_DIR"
          git fetch wiki-mod "$GITHUB_REF_NAME"
          git checkout -f FETCH_HEAD
          git log --oneline -3

      - name: Sync source to sccache-dist worker (240)
        run: |
          rsync -a --delete --exclude='.git' "$BUILD_DIR/" "${{ secrets.SCCACHE_WORKER }}:$BUILD_DIR/"

      - name: Clean stale Cargo caches (cc-rs + whatsys)
        run: |
          OBJ=/opt/codex/firefox/builds/win-cross-obj
          for pkg in cc whatsys; do
            find "$OBJ/release/build/" -maxdepth 1 -name "${pkg}-*" -exec rm -rf {} + 2>/dev/null || true
            find "$OBJ/release/.fingerprint/" -maxdepth 1 -name "${pkg}-*" -exec rm -rf {} + 2>/dev/null || true
          done
          find "$OBJ/release/deps/" -maxdepth 1 -name 'libcc-*' -delete 2>/dev/null || true
          grep -q 'cfg!(target_os = "macos")' "$BUILD_DIR/third_party/rust/cc/src/lib.rs" \
            && echo "cc-rs patch: present" || echo "cc-rs patch: MISSING – source checkout may be stale"

      - name: sccache stats (before)
        run: /opt/codex/.cargo/bin/sccache --show-stats 2>/dev/null || true

      - name: Build Firefox (Windows cross)
        run: |
          mkdir -p "$ARTIFACT_DIR"
          cd "$BUILD_DIR"
          ./mach build 2>&1 | tee "$ARTIFACT_DIR/build.log"
          echo "BUILD_STATUS=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: sccache stats (after)
        if: always()
        run: /opt/codex/.cargo/bin/sccache --show-stats 2>/dev/null || true

      - name: Package Firefox (Windows)
        if: env.BUILD_STATUS == '0'
        run: |
          cd "$BUILD_DIR"
          ./mach package 2>&1 | tee -a "$ARTIFACT_DIR/build.log"
          find /opt/codex/firefox/builds/win-cross-obj/dist/ -maxdepth 1 \
            \( -name 'firefox-*.win64.zip' -o -name 'firefox-*.win64.installer.exe' \) \
            -exec cp {} "$ARTIFACT_DIR/" \;

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: win-cross-${{ github.sha }}
          path: ${{ env.ARTIFACT_DIR }}/
          retention-days: 14

      - name: Fail if build failed
        if: env.BUILD_STATUS != '0'
        run: exit 1
