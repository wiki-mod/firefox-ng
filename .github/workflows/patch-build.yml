name: Patch Build CI

# Runs on push to any build/** branch using a self-hosted runner on 192.168.1.229.
# sccache-dist: scheduler 192.168.1.220:10500, Redis 192.168.1.230.
# Build dir: /opt/codex/firefox/dev  Obj dir: /opt/codex/firefox/builds/dev-obj
# mozconfig: /opt/codex/firefox/mozconfig.dev (symlinked as dev/.mozconfig)

on:
  push:
    branches:
      - 'build/**'
  workflow_dispatch:

jobs:
  build-linux:
    name: Build (${{ github.ref_name }})
    runs-on: [self-hosted, linux, firefox-build]
    timeout-minutes: 180

    env:
      BUILD_DIR: /opt/codex/firefox/dev
      ARTIFACT_DIR: /opt/codex/firefox/artifacts/${{ github.run_id }}
      RUSTC_WRAPPER: sccache
      SCCACHE_CONF: /opt/codex/firefox/sccache-nodist.conf

    steps:
      - name: Fetch and checkout build branch
        run: |
          cd "$BUILD_DIR"
          git config remote.wiki-mod.promisor true
          git fetch --filter=blob:none wiki-mod "$GITHUB_REF_NAME"
          git checkout FETCH_HEAD
          git log --oneline -3

      - name: Sync source to sccache-dist worker (240)
        run: |
          rsync -a --delete --exclude='.git' "$BUILD_DIR/" codex@192.168.1.240:"$BUILD_DIR/"

      - name: sccache stats (before)
        run: sccache --show-stats 2>/dev/null || true

      - name: Build Firefox
        run: |
          mkdir -p "$ARTIFACT_DIR"
          cd "$BUILD_DIR"
          ./mach build 2>&1 | tee "$ARTIFACT_DIR/build.log"
          echo "BUILD_STATUS=${PIPESTATUS[0]}" >> "$GITHUB_ENV"

      - name: sccache stats (after)
        if: always()
        run: sccache --show-stats 2>/dev/null || true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ github.sha }}
          path: ${{ env.ARTIFACT_DIR }}/build.log
          retention-days: 14

      - name: Fail if build failed
        if: env.BUILD_STATUS != '0'
        run: exit 1
