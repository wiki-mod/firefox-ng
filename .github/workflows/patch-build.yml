name: Patch Build CI

# Runs on push to any patch/* branch using a self-hosted runner on 192.168.1.229.
# Standard GitHub runners are too small for Firefox (need ~50 GB disk, 16+ GB RAM).
#
# Runner setup (one-time, on 192.168.1.229):
#   cd /opt/firefox
#   mkdir actions-runner && cd actions-runner
#   curl -O -L https://github.com/actions/runner/releases/latest/download/actions-runner-linux-x64-*.tar.gz
#   tar xzf *.tar.gz
#   ./config.sh --url https://github.com/wiki-mod/firefox-ng --token <TOKEN> --labels firefox-build
#   sudo ./svc.sh install && sudo ./svc.sh start
#
# The runner expects a pre-existing Firefox checkout at /opt/firefox/build
# with wiki-mod remote already configured (saves re-clone time).

on:
  push:
    branches:
      - 'patch/**'
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (default: current)'
        required: false

jobs:
  build-linux:
    name: Build (${{ github.ref_name }})
    runs-on: [self-hosted, linux, firefox-build]
    timeout-minutes: 180

    env:
      BUILD_DIR: /opt/firefox/build
      ARTIFACT_DIR: /opt/firefox/artifacts/${{ github.run_id }}

    steps:
      - name: Update checkout to patch branch
        run: |
          cd "$BUILD_DIR"
          git fetch wiki-mod "$GITHUB_REF_NAME"
          git checkout FETCH_HEAD
          git log --oneline -3

      - name: Detect build type from changed files
        id: build-type
        run: |
          cd "$BUILD_DIR"
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "unknown")
          echo "Changed files: $CHANGED"
          if echo "$CHANGED" | grep -qE '\.(cpp|c|h|rs|mm)$'; then
            echo "cmd=binaries" >> "$GITHUB_OUTPUT"
            echo "label=C++/Rust" >> "$GITHUB_OUTPUT"
          else
            echo "cmd=faster" >> "$GITHUB_OUTPUT"
            echo "label=frontend-only" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Firefox (${{ steps.build-type.outputs.label }})
        run: |
          mkdir -p "$ARTIFACT_DIR"
          cd "$BUILD_DIR"
          ./mach build ${{ steps.build-type.outputs.cmd }} 2>&1 | tee "$ARTIFACT_DIR/build.log"
          BUILD_STATUS=${PIPESTATUS[0]}
          echo "Build exit: $BUILD_STATUS"
          echo "BUILD_STATUS=$BUILD_STATUS" >> "$GITHUB_ENV"

      - name: Run quick smoke test
        if: env.BUILD_STATUS == '0'
        run: |
          cd "$BUILD_DIR"
          ./mach test --headless --auto --tag smoke 2>&1 | tee "$ARTIFACT_DIR/test.log" || true

      - name: Upload build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: build-${{ github.ref_name }}-${{ github.sha }}
          path: |
            ${{ env.ARTIFACT_DIR }}/build.log
            ${{ env.ARTIFACT_DIR }}/test.log
          retention-days: 14

      - name: Fail if build failed
        if: env.BUILD_STATUS != '0'
        run: |
          echo "Build FAILED. Check the uploaded build log for details."
          exit 1
